</head>

    <div id="sidebar-container"></div>

    <main class="a-main">
      <header class="a-topbar">
        <div>
          <h1 class="a-title">Terms</h1>
          <p class="a-desc">Manage academic terms and date ranges.</p>
        </div>

        <div class="a-actions">
          <button class="a-btn a-btn--ghost" type="button" id="refreshTermsBtn">Refresh</button>
          <button class="a-btn" type="button" id="addTermBtn">+ Add Term</button>
        </div>
      </header>

      <section class="a-page-tools">
        <div class="a-search-wrap">
          <input
            type="text"
            id="termSearch"
            class="a-search"
            placeholder="Search by term hash or name"
          />
        </div>
      </section>

      <section class="a-table-card">
        <div class="a-table-wrap">
          <table class="a-table">
            <thead>
              <tr>
                <th>Term Hash</th>
                <th>Name</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="termsTableBody">
              <tr>
                <td colspan="6" class="a-table-empty">Loading terms...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- View Term Modal -->
  <div class="a-modal" id="termViewModal">
    <div class="a-modal__backdrop" id="termModalBackdrop"></div>

    <div class="a-modal__content">
      <div class="a-modal__header">
        <h2>Term Details</h2>
        <button class="a-modal__close" type="button" id="closeTermModalBtn">×</button>
      </div>

      <div class="a-modal__body">
        <div class="a-detail-grid">
          <div class="a-detail-item">
            <span class="a-detail-label">Term Hash</span>
            <span class="a-detail-value" id="detailTermHash">—</span>
          </div>

          <div class="a-detail-item">
            <span class="a-detail-label">Name</span>
            <span class="a-detail-value" id="detailTermName">—</span>
          </div>

          <div class="a-detail-item">
            <span class="a-detail-label">Start Date</span>
            <span class="a-detail-value" id="detailTermStartDate">—</span>
          </div>

          <div class="a-detail-item">
            <span class="a-detail-label">End Date</span>
            <span class="a-detail-value" id="detailTermEndDate">—</span>
          </div>

          <div class="a-detail-item">
            <span class="a-detail-label">Created At</span>
            <span class="a-detail-value" id="detailTermCreatedAt">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Term Modal -->
  <div class="a-modal" id="addTermModal">
    <div class="a-modal__backdrop" id="addTermBackdrop"></div>

    <div class="a-modal__content">
      <div class="a-modal__header">
        <h2 id="termFormTitle">Add Term</h2>
        <button class="a-modal__close" type="button" id="closeAddTermBtn">×</button>
      </div>

      <div class="a-modal__body">
        <form id="addTermForm" class="a-form">
          <div class="a-form-row">
            <label>Term Hash</label>
            <input type="text" id="newTermHash" required>
          </div>

          <div class="a-form-row">
            <label>Name</label>
            <input type="text" id="newTermName" required>
          </div>

          <div class="a-form-row">
            <label>Start Date</label>
            <input type="date" id="newTermStartDate">
          </div>

          <div class="a-form-row">
            <label>End Date</label>
            <input type="date" id="newTermEndDate">
          </div>

          <div class="a-form-actions">
            <button type="button" class="a-btn a-btn--ghost" id="cancelAddTerm">Cancel</button>
            <button type="submit" class="a-btn" id="saveTermBtn">Save Term</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../config/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/load-sidebar.js"></script>
  <script src="../assets/js/admin/terms.js"></script>
</body>
</html>
