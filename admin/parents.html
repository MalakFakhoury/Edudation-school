<div class="a-page-header">
  <h1>Parents</h1>

  <div class="a-page-actions">
    <input
      id="parentSearch"
      class="a-search"
      placeholder="Search parent..."
    />

    <button id="refreshParentsBtn" class="a-btn a-btn--ghost">
      Refresh
    </button>

    <button id="addParentBtn" class="a-btn">
      + Add Parent
    </button>
  </div>
</div>

<table class="a-table">
  <thead>
    <tr>
      <th>Parent ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Created</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="parentsTableBody">
  </tbody>
</table>
