<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Levels</title>

  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>
  <div class="a-layout">
    <aside class="a-sidebar">
      <div class="a-brand">
        <img src="../assets/Images/logo-education.jpeg" alt="Logo">
        <span>eSchool</span>
      </div>

      <div class="a-profile">
        <img class="a-avatar" src="../assets/Images/default_profile.avif" alt="Profile">
        <div>
          <div class="a-name">Admin Name</div>
          <div class="a-sub">Administrator</div>
        </div>
      </div>

      <nav class="a-nav">
        <a class="a-nav__item" href="./admin.html">Dashboard</a>

        <div class="a-nav__label">Users</div>
        <a class="a-nav__item" href="./students.html">Students</a>
        <a class="a-nav__item" href="./teachers.html">Teachers</a>
        <a class="a-nav__item" href="./parents.html">Parents</a>
        <a class="a-nav__item" href="./admins.html">Admins</a>

        <div class="a-nav__label">Academics</div>
        <a class="a-nav__item active" href="./levels.html">Levels</a>
        <a class="a-nav__item" href="./courses.html">Courses</a>
        <a class="a-nav__item" href="./classes.html">Classes</a>
        <a class="a-nav__item" href="./sections.html">Sections</a>
        <a class="a-nav__item" href="./terms.html">Terms</a>

        <div class="a-nav__sep"></div>
        <a class="a-nav__item" href="../login/index.html">Logout</a>
      </nav>
    </aside>

    <main class="a-main">
      <header class="a-topbar">
        <div>
          <h1 class="a-title">Levels</h1>
          <p class="a-desc">Manage school grade levels.</p>
        </div>

        <div class="a-actions">
          <button class="a-btn a-btn--ghost" type="button" id="refreshLevelsBtn">Refresh</button>
          <button class="a-btn" type="button" id="addLevelBtn">+ Add Level</button>
        </div>
      </header>

      <section class="a-page-tools">
        <div class="a-search-wrap">
          <input
            type="text"
            id="levelSearch"
            class="a-search"
            placeholder="Search by grade hash or name"
          />
        </div>
      </section>

      <section class="a-table-card">
        <div class="a-table-wrap">
          <table class="a-table">
            <thead>
              <tr>
                <th>Grade Hash</th>
                <th>Name</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="levelsTableBody">
              <tr>
                <td colspan="3" class="a-table-empty">Loading levels...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- View Level Modal -->
  <div class="a-modal" id="levelViewModal">
    <div class="a-modal__backdrop" id="levelModalBackdrop"></div>

    <div class="a-modal__content">
      <div class="a-modal__header">
        <h2>Level Details</h2>
        <button class="a-modal__close" type="button" id="closeLevelModalBtn">×</button>
      </div>

      <div class="a-modal__body">
        <div class="a-detail-grid">
          <div class="a-detail-item">
            <span class="a-detail-label">Grade Hash</span>
            <span class="a-detail-value" id="detailLevelHash">—</span>
          </div>

          <div class="a-detail-item">
            <span class="a-detail-label">Name</span>
            <span class="a-detail-value" id="detailLevelName">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Level Modal -->
  <div class="a-modal" id="addLevelModal">
    <div class="a-modal__backdrop" id="addLevelBackdrop"></div>

    <div class="a-modal__content">
      <div class="a-modal__header">
        <h2 id="levelFormTitle">Add Level</h2>
        <button class="a-modal__close" type="button" id="closeAddLevelBtn">×</button>
      </div>

      <div class="a-modal__body">
        <form id="addLevelForm" class="a-form">
          <div class="a-form-row">
            <label>Grade Hash</label>
            <input type="text" id="newLevelHash" required>
          </div>

          <div class="a-form-row">
            <label>Name</label>
            <input type="text" id="newLevelName" required>
          </div>

          <div class="a-form-actions">
            <button type="button" class="a-btn a-btn--ghost" id="cancelAddLevel">Cancel</button>
            <button type="submit" class="a-btn" id="saveLevelBtn">Save Level</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../config/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/admin/levels.js"></script>
</body>
</html>
