<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher | Grades</title>

  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="./teacher.css"/>
</head>
<body>
  <div class="t-layout">

   <div id="teacher-sidebar-container"></div>

    <main class="t-main">
      <header class="t-topbar">
        <div>
          <h1 class="t-title">Grades</h1>
          <p class="t-desc">View and submit grades for a selected course section.</p>
        </div>

        <div>
          <button class="t-btn" type="button" id="saveGradesBtn">Save Grades</button>
        </div>
      </header>

      <section class="t-tools-row" style="align-items:flex-end;">
        <div class="t-form-row">
          <label for="gradesSectionHashInput">Section Hash</label>
          <input
            type="text"
            id="gradesSectionHashInput"
            class="t-input"
            placeholder="Enter section hash"
          />
        </div>

        <div class="t-form-row">
          <label for="gradesCourseSectionHashInput">Course Section Hash</label>
          <input
            type="text"
            id="gradesCourseSectionHashInput"
            class="t-input"
            placeholder="Enter course section hash"
          />
        </div>

        <button class="t-btn t-btn--ghost" type="button" id="loadGradesBtn">
          Load Grades
        </button>
      </section>

      <section class="t-info-row">
        <p class="t-muted" id="selectedGradesSectionLabel">
          Selected course section: Unknown
        </p>
      </section>

      <section id="gradesListWrap" class="t-list-wrap">
        <div class="t-empty-state">
          <div class="t-card__meta">Info</div>
          <h3 class="t-card__title">Load grades first</h3>
          <p class="t-muted">Enter a course section hash to load grades.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="../config/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/teacher/teacher.js"></script>
  <script src="../assets/js/teacher/grades.js"></script>
</body>
</html>
