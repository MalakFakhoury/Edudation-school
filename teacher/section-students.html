<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher | Section Students</title>

  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="./teacher.css" />
</head>
<body>
  <div class="t-layout">

    <!-- SIDEBAR -->
    <div id="teacher-sidebar-container"></div>

    <!-- MAIN -->
    <main class="t-main">

      <!-- HEADER -->
      <header class="t-topbar">
        <div>
          <h1 class="t-title">Section Students</h1>
          <p class="t-desc">View students in the selected course section.</p>
        </div>

        <div>
          <button class="t-btn t-btn--ghost" id="backToSectionsBtn">Back</button>
        </div>
      </header>

      <!-- INPUT -->
      <section style="margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap;">
        <input
          type="text"
          id="courseSectionHashInput"
          class="t-input"
          placeholder="Enter course section hash"
        />

        <button class="t-btn t-btn--ghost" id="loadStudentsBtn">
          Load Students
        </button>
      </section>

      <!-- LABEL -->
      <section style="margin-top: 10px;">
        <p class="t-muted" id="selectedSectionLabel">
          Selected course section: Unknown
        </p>
      </section>

      <!-- GRID -->
      <section class="t-grid" id="studentsGrid">
        <article class="t-card t-card--empty">
          <div class="t-card__body">
            <div class="t-card__meta">Info</div>
            <h3 class="t-card__title">Load students</h3>
            <p class="t-muted">Enter course section hash to load students.</p>
          </div>
        </article>
      </section>

    </main>
  </div>

  <!-- SCRIPTS -->
  <script src="../config/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>

  <script src="../assets/js/teacher/teacher.js"></script>
  <script src="../assets/js/teacher/section-students.js"></script>
</body>
</html>
