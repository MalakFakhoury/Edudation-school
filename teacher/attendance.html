<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher | Attendance</title>

  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="./teacher.css" />
</head>
<body>
  <div class="t-layout">
    <div id="teacher-sidebar-container"></div>
    <main class="t-main">
      <header class="t-topbar">
        <div>
          <h1 class="t-title">Attendance</h1>
          <p class="t-desc">Load students and mark daily attendance for a section.</p>
        </div>

        <div>
          <button class="t-btn" type="button" id="saveAttendanceBtn">Save Attendance</button>
        </div>
      </header>

      <section class="t-tools-row" style="align-items:flex-end;">
        <div class="t-form-row">
          <label for="attendanceDateInput">Attendance Date</label>
          <input type="date" id="attendanceDateInput" class="t-input" />
        </div>

        <div class="t-form-row">
          <label for="attendanceCourseSectionHashInput">Course Section Hash</label>
          <input
            type="text"
            id="attendanceCourseSectionHashInput"
            class="t-input"
            placeholder="Enter course section hash"
          />
        </div>

        <div class="t-form-row">
          <label for="attendanceSectionHashInput">Section Hash (optional)</label>
          <input
            type="text"
            id="attendanceSectionHashInput"
            class="t-input"
            placeholder="Enter section hash"
          />
        </div>

        <div class="t-form-row">
          <label for="attendanceTimetableHashInput">Timetable Hash (optional)</label>
          <input
            type="text"
            id="attendanceTimetableHashInput"
            class="t-input"
            placeholder="Enter timetable hash"
          />
        </div>

        <button class="t-btn t-btn--ghost" type="button" id="loadAttendanceBtn">
          Load Students
        </button>
      </section>

      <section class="t-info-row">
        <p class="t-muted" id="selectedAttendanceSectionLabel">
          Selected course section: Unknown
        </p>
      </section>

      <section id="attendanceListWrap" class="t-list-wrap">
        <div class="t-empty-state">
          <div class="t-card__meta">Info</div>
          <h3 class="t-card__title">Load students first</h3>
          <p class="t-muted">Enter a course section hash to load attendance list.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="../config/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/teacher/teacher.js"></script>
  <script src="../assets/js/teacher/attendance.js"></script>
</body>
</html>
