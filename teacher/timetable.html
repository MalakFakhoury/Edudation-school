<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher | Timetable</title>

  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="./teacher.css" />
</head>
<body>
  <div class="t-layout">

    <!-- SIDEBAR -->
    <aside class="t-sidebar">
      <div class="t-brand">
        <img src="../assets/Images/logo-education.jpeg" alt="Logo" />
        <span>eSchool</span>
      </div>

      <div class="t-profile">
        <img class="t-avatar-img" src="../assets/Images/default_profile.avif" alt="Profile" />
        <div class="t-profile__meta">
          <div class="t-name">Teacher Name</div>
          <div class="t-sub">Teacher Panel</div>
        </div>
      </div>

      <nav class="t-nav">
        <a class="t-nav__item" href="./teachers.html">My Sections</a>
        <a class="t-nav__item" href="./timetable.html">Timetable</a>
        <a class="t-nav__item" href="./lessons.html">Lessons</a>
        <a class="t-nav__item" href="./resources.html">Resources</a>
        <a class="t-nav__item" href="./assignments.html">Assignments</a>
        <a class="t-nav__item" href="./quizzes.html">Quizzes</a>
        <a class="t-nav__item" href="./attendance.html">Attendance</a>
        <a class="t-nav__item" href="./announcements.html">Announcements</a>
        <a class="t-nav__item" href="./analytics.html">Analytics</a>
        <a class="t-nav__item" href="./section-students.html">Section Students</a>

        <div class="t-nav__sep"></div>
        <a class="t-nav__item" href="../login/index.html">Logout</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="t-main">
      <header class="t-topbar">
        <div>
          <h1 class="t-title">My Timetable</h1>
          <p class="t-desc">View your teaching schedule by term.</p>
        </div>
      </header>

      <!-- TERM HASH INPUT -->
      <section style="margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
        <input
          type="text"
          id="teacherTimetableTermHashInput"
          placeholder="Enter term hash"
          style="
            height: 38px;
            min-width: 240px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: white;
            color: var(--text);
            outline: none;
          "
        />
        <button class="t-btn t-btn--ghost" type="button" id="loadTeacherTimetableBtn">
          Load Timetable
        </button>
      </section>

      <!-- ORG TYPE LABEL -->
      <section style="margin-top: 10px;">
        <p class="t-muted" id="teacherTimetableOrgTypeLabel">
          Organization type: Unknown
        </p>
      </section>

      <!-- GRID -->
      <section class="t-grid" id="teacherTimetableGrid">
        <article class="t-card t-card--empty">
          <div class="t-card__body">
            <div class="t-card__meta">Info</div>
            <h3 class="t-card__title">Load timetable</h3>
            <p class="t-muted">Enter a term hash to load your timetable.</p>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="../config/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/teacher/teacher.js"></script>
  <script src="../assets/js/teacher/timetable.js"></script>
</body>
</html>
